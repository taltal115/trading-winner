name: backend

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint + type + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      # Install the dev extra only (NOT [firestore]); the suite asserts the
      # adapter degrades gracefully when the optional SDK is absent.
      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Ruff (lint + import order)
        run: ruff check app tests

      - name: Black (format check)
        run: black --check app tests

      - name: Mypy (strict)
        run: mypy app

      - name: Pytest
        run: pytest -q
