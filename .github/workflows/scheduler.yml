name: scheduler

# Scheduled trading jobs (ARCHITECTURE.md section 7, DEPLOYMENT.md 5.3).
# Each job is a stateless, idempotent worker that connects to Firestore and logs
# its run as a JobRecord. Crons are in UTC and target US market hours on
# weekdays. Configure repo/environment vars + secrets before enabling:
#   vars:    TW_FIRESTORE_PROJECT, TW_PHASE (optional overrides; see defaults below)
#   secrets: FIREBASE_SERVICE_ACCOUNT (GCP service-account JSON for the SAME
#            project as TW_FIRESTORE_PROJECT; needs roles/datastore.user)
#
# TW_PHASE / TW_FIRESTORE_PROJECT default when repo vars are unset — an empty
# TW_PHASE env var breaks pydantic (ValidationError on SystemPhase).
#
# If workers fail with PERMISSION_DENIED on Firestore, see README.md
# "GitHub Actions scheduler (Firestore)".

on:
  workflow_dispatch:
    inputs:
      job:
        description: Worker to run on demand
        type: choice
        options: [daily_pipeline, position_monitor, reconciliation, learning_job]
        default: daily_pipeline
  schedule:
    - cron: "*/30 13-20 * * 1-5" # daily pipeline, every 30m during market hours
    - cron: "*/15 13-20 * * 1-5" # position monitor (live exits), every 15m
    - cron: "15 20 * * 1-5" # end-of-day position reconciliation
    - cron: "0 22 * * 1-5" # learning loop backfill (Phase 6+)

permissions:
  contents: read

env:
  TW_ENVIRONMENT: staging
  TW_PHASE: ${{ vars.TW_PHASE || '5' }}
  TW_REPOSITORY_BACKEND: firestore
  TW_FIRESTORE_PROJECT: ${{ vars.TW_FIRESTORE_PROJECT || 'trading-winner-staging' }}

jobs:
  daily-pipeline:
    if: >-
      github.event.schedule == '*/30 13-20 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' && inputs.job == 'daily_pipeline')
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/firestore-worker-setup
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      - run: python -m app.workers.daily_pipeline

  position-monitor:
    if: >-
      github.event.schedule == '*/15 13-20 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' && inputs.job == 'position_monitor')
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/firestore-worker-setup
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      - run: python -m app.workers.position_monitor

  reconciliation:
    if: >-
      github.event.schedule == '15 20 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' && inputs.job == 'reconciliation')
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/firestore-worker-setup
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      - run: python -m app.workers.reconciliation

  learning-job:
    if: >-
      github.event.schedule == '0 22 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' && inputs.job == 'learning_job')
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/firestore-worker-setup
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      - run: python -m app.workers.learning_job
