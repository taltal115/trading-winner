name: Firestore worker setup
description: Python 3.13, firestore extra, and GCP auth for scheduled workers.

inputs:
  credentials_json:
    description: GCP service account key JSON (FIREBASE_SERVICE_ACCOUNT secret).
    required: true

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"
        cache: pip
        cache-dependency-path: backend/pyproject.toml

    - name: Install backend (firestore extra)
      shell: bash
      working-directory: backend
      run: pip install ".[firestore]"

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ inputs.credentials_json }}

    - name: Verify Firestore write access
      shell: bash
      working-directory: backend
      run: python scripts/verify_firestore_access.py
